services:
  # ── Reverse proxy (the only service exposed to the internet) ──
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - kelly-criterion
      - bidirectional-translations

  # ── Your existing sites ──

  frontend:
    image: bloodisblue/my-blog:1.3.0
    restart: unless-stopped

  backend:
    image: bloodisblue/blog-backend:1.2.0
    restart: unless-stopped

  kelly-criterion:
    image: bloodisblue/kelly-criterion-client:1.1.0
    restart: unless-stopped

  # ── Phoenix / bidirectional translations ──

  bidirectional-translations:
    image: bloodisblue/bidirectional-translations:1.3.1
    restart: unless-stopped
    environment:
      - DATABASE_URL
      - SECRET_KEY_BASE
      - PHX_HOST
      - PHX_SERVER=true
      - POOL_SIZE=2
