events {}

http {
    # ── Global settings ──

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Don't reveal nginx version in error pages / headers
    server_tokens off;

    # ── yoloresponsibly.com ──

    server {
        server_name yoloresponsibly.com;

        listen 80;
        listen [::]:80;

        location / {
            proxy_pass http://kelly-criterion:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── wrightdavid.com ──

    server {
        server_name wrightdavid.com;

        listen 80;
        listen [::]:80;

        # Angular frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Node.js API (strips /api/ prefix)
        location /api/ {
            proxy_pass http://backend:8888/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── bidirectional translations (Phoenix + LiveView) ──

    server {
        server_name translatemethod.com www.translatemethod.com;

        listen 80;
        listen [::]:80;

        location / {
            proxy_pass http://bidirectional-translations:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for LiveView WebSocket connections
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
